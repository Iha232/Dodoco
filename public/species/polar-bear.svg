<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" width="400" height="260">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1a2a"/>
      <stop offset="100%" style="stop-color:#1a3a5a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" style="stop-color:#e0f2fe;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#1a3a5a;stop-opacity:0"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#e0f2fe" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="260" fill="url(#bg)"/>
  <rect width="400" height="260" fill="url(#glow)"/>

  <!-- Decorative circles -->
  <circle cx="320" cy="40" r="60" fill="#e0f2fe" opacity="0.06"/>
  <circle cx="60" cy="220" r="80" fill="#e0f2fe" opacity="0.05"/>
  <circle cx="200" cy="130" r="100" fill="#e0f2fe" opacity="0.04"/>

  <!-- Grid lines -->
  <line x1="0" y1="65" x2="400" y2="65" stroke="#e0f2fe" stroke-width="0.3" opacity="0.15"/>
  <line x1="0" y1="195" x2="400" y2="195" stroke="#e0f2fe" stroke-width="0.3" opacity="0.15"/>
  <line x1="100" y1="0" x2="100" y2="260" stroke="#e0f2fe" stroke-width="0.3" opacity="0.10"/>
  <line x1="300" y1="0" x2="300" y2="260" stroke="#e0f2fe" stroke-width="0.3" opacity="0.10"/>

  <!-- Emoji -->
  <text x="200" y="128" font-size="72" text-anchor="middle" filter="url(#shadow)">🐻</text>

  <!-- Name background pill -->
  <rect x="30" y="188" width="340" height="52" rx="10" fill="#0a1a2a" opacity="0.75"/>
  <rect x="30" y="188" width="340" height="52" rx="10" fill="none" stroke="#e0f2fe" stroke-width="0.8" opacity="0.4"/>

  <!-- Species name -->
  <text x="200" y="206" font-family="Space Grotesk, system-ui, sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle" opacity="0.95">Polar</text>
  <text x="200" y="228" font-family="Space Grotesk, system-ui, sans-serif" font-size="17" font-weight="700" fill="#ffffff" text-anchor="middle" opacity="0.95">Bear</text>

  <!-- Accent dot -->
  <circle cx="200" cy="172" r="3" fill="#e0f2fe" opacity="0.8"/>
  <circle cx="186" cy="172" r="2" fill="#e0f2fe" opacity="0.4"/>
  <circle cx="214" cy="172" r="2" fill="#e0f2fe" opacity="0.4"/>
</svg>